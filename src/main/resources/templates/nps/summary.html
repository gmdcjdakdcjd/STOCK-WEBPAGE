<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/basic.html}">
<head>
    <meta charset="UTF-8">
    <title>국민연금 투자 현황</title>

    <style>
        .nps-card {
            border-radius: 18px;
            min-height: 420px; /* 카드 높이 고정 */
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .nps-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 28px rgba(0,0,0,.10);
        }

        .nps-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .nps-count {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0.5rem 0;
        }

        .nps-sub {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .nps-card .btn {
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 12px;
        }
    </style>
</head>

<body>
<div layout:fragment="content" class="container mt-4">

    <h3 class="fw-bold mb-2">국민연금 투자 현황</h3>
    <div class="text-muted small mb-4">
        ※ 기준일 기준 국민연금(NPS) 보유 자산 요약입니다.
    </div>

    <div class="row g-4">

        <!-- 카드 반복 -->
        <div class="col-12 col-lg-6"
             th:each="row : ${list}">

            <div class="card nps-card shadow-sm h-100">
                <div class="card-body
                            d-flex
                            flex-column
                            align-items-center
                            text-center">

                    <!-- 🔹 중앙 컨텐츠 영역 -->
                    <div class="flex-grow-1
                                d-flex
                                flex-column
                                justify-content-center
                                align-items-center">

                        <!-- 자산 / 시장 -->
                        <div class="nps-title mb-3"
                             th:text="${
                                (row.assetType == 'STOCK' ? '주식' :
                                 row.assetType == 'BOND'  ? '채권' : row.assetType)
                                + ' | ' +
                                (row.market == 'KR'     ? '한국' :
                                 row.market == 'US'     ? '미국' :
                                 row.market == 'GLOBAL' ? '국제' : row.market)
                             }">
                            주식 | 한국
                        </div>

                        <!-- KPI 숫자 -->
                        <div class="nps-count"
                             th:text="${#numbers.formatInteger(row.totalCount, 0, 'COMMA')}">
                            1,200
                        </div>

                        <div class="nps-sub">보유 종목</div>
                    </div>

                    <!-- 🔹 버튼 영역 (항상 하단) -->
                    <div class="w-100 px-3">
                        <a class="btn btn-outline-primary w-100"
                           th:href="@{/nps/list(asset=${row.assetType}, market=${row.market})}">
                            목록 보기
                        </a>
                    </div>

                </div>
            </div>

        </div>
        <!-- 카드 반복 끝 -->

    </div>

</div>
</body>
</html>
